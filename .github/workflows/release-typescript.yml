name: Release TypeScript SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger is always dry-run (rehearsal mode)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smithy:
    uses: ./.github/workflows/smithy-verify.yml
    permissions:
      contents: read

  test:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] -- cached deps are for testing, not release artifact generation
        with:
          # Match the publish job so the build/test runtime equals the release runtime.
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: Publish to npm
    needs: [smithy, test]
    runs-on: ubuntu-latest
    environment: release-npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] -- cache is branch-isolated; fork PRs cannot write to this cache
        with:
          # Node 24 ships npm 11.12.1, which clears the 11.5.1 floor for OIDC
          # trusted publishing. Node 22's bundled npm 10.9.7 does not, and its
          # `npm install -g npm@latest` self-upgrade is currently broken.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json

      - name: Verify npm version supports trusted publishing
        run: |
          INSTALLED=$(npm --version)
          echo "npm version: $INSTALLED"
          NPM_VERSION="$INSTALLED" node -e '
            const [M, m, p] = (process.env.NPM_VERSION || "").split(".").map(Number);
            process.exit(M > 11 || (M === 11 && (m > 5 || (m === 5 && p >= 1))) ? 0 : 1);
          ' || {
            echo "::error::npm $INSTALLED is too old for trusted publishing (need 11.5.1+)"
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # Manual trigger (dry-run): read from package.json
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Rehearsal for version: $VERSION"
          else
            # Tag trigger: extract from tag (v0.2.1 → 0.2.1)
            VERSION="${GITHUB_REF#refs/tags/v}"
            PKG_VERSION=$(node -p "require('./package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::Package version ($PKG_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Releasing version: $VERSION"
          fi

      - name: Determine npm tag
        id: npm-tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if already published
        id: check-published
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${VERSION} already published to npm"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check-published.outputs.already_published != 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            set +e
            output=$(npm publish --access public --tag "$NPM_TAG" --provenance 2>&1)
            status=$?
            set -e
            echo "$output"
            if [ "$status" -eq 0 ]; then
              echo "Publish succeeded."
            elif echo "$output" | grep -q "You cannot publish over the previously published versions"; then
              echo "::notice::Version already published — treating as success for idempotency."
            else
              exit "$status"
            fi
          else
            echo "::notice::Dry run mode - not actually publishing"
            npm publish --access public --tag "$NPM_TAG" --dry-run
          fi
